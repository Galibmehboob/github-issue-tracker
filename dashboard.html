<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Dashboard</title>

    <!-- Tailwind and daisy -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Style -->
    <link rel="stylesheet" href="./style/style.css">



</head>

<body>

    <main class="bg-base-200 min-h-screen">
        <!-- Navbar -->
        <div class="navbar bg-base-100 shadow-sm px-6 sticky top-0">

            <div class="flex-1 flex items-center gap-2">
                <img src="./assets/github-logo.png" class="w-6">
                <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
            </div>

            <div class="flex-none flex gap-3 items-center">

                <input id="search-issue" type="text" placeholder="Search issues..."
                    class="w-64 border-none bg-gray-100  rounded-md px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
                <button class="btn btn-squer"><i class="fa-brands fa-sistrix text-xl"></i></button>
                <button class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i>New Issue
                </button>
            </div>

        </div>


        <!-- Filter Tabs -->
        <section class="w-10/12 mx-auto ">
            <div class="mt-6 p-5 shadow-sm bg-white rounded-md">
                <div class="tabs tabs-boxed w-fit gap-4">
                    <button class=" px-9 btn btn-primary"> All</button>
                    <button class=" px-9 btn">Open</button>
                    <button class=" px-9 btn">Closed</button>
                </div>

            </div>


            <!-- Issues Container -->

            <div class="mt-6 mb-6 p-5 shadow-sm bg-white rounded-md">
                <div class="flex justify-between ">
                    <div class="flex gap-3">
                        <div class="w-12 h-12 flex items-center justify-center bg-blue-100 rounded-full">
                            <img class=" flex text-center w-9" src="./assets/Aperture.png" alt="">
                        </div>
                        <div class=" flex flex-col text-start  justify-center">
                            <h1 class="font-bold text-2xl ">50 Issues</h1>
                            <p class="text-gray-500 text-sm mb-6">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <p><span class="inline-block w-3 h-3 bg-green-500 rounded-full"></span> Open</p>
                        <p><span class="inline-block w-3 h-3 bg-purple-500 rounded-full"></span> Close</p>
                    </div>
                </div>
                <hr class="border-t-2 border-gray-200 -mx-5">
                <!-- Issue Card Example -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-5" id="issues-container">

                    <div class="card bg-base-100 shadow rounded-md overflow-auto">
                        <div class="border-t-3 border-green-400 rounded-full"></div>
                        <div class="card-body">
                            <!-- top section -->
                            <div class="flex justify-between items-center">
                                <!-- green circle image -->
                                <img src="./assets/Open-Status.png">
                                <!-- priority -->
                                <span class="bg-red-100 text-xs text-red-400 px-6 py-2 rounded-full font-semibold">
                                    HIGH
                                </span>
                            </div>
                            <!-- title -->
                            <h2 class="card-title text-lg font-bold mt-3">
                                Fix Navigation Menu On Mobile Devices
                            </h2>

                            <!-- description -->
                            <p class="text-gray-500 text-sm">
                                The navigation menu doesn't collapse properly on mobile devices...
                            </p>

                            <!-- tags -->
                            <div class="flex gap-3 mt-4">

                                <span
                                    class="flex items-center gap-2 border border-red-300 text-red-500 text-xs px-2 py-1 rounded-full">
                                    <i class="fa-solid fa-bug"></i>
                                    BUG
                                </span>

                                <span
                                    class="flex items-center gap-2 border border-yellow-400 text-yellow-600 px-2  py-1 rounded-full text-xs">
                                    <i class="fa-regular fa-life-ring"></i>
                                    HELP WANTED
                                </span>

                            </div>

                        </div>

                        <!-- footer -->
                        <div class="border-t-2 px-6 py-4 border-gray-200 text-gray-400 text-sm">
                            <p>#1 by john_doe</p>
                            <p>1/15/2024</p>
                        </div>

                    </div>

                </div>

            </div>
        </section>



    </main>



</body>

</html>
