<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- Tailwind and daisy -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Style -->
    <link rel="stylesheet" href="./style/style.css">

</head>

<body>
    <!-- Login page -->
    <main class="bg-gray-100 flex items-center justify-center min-h-screen">
        <div class="bg-white shadow-lg rounded-lg p-8 w-96 text-center">
            <!-- logo -->
            <div class="flex justify-center mx-auto mb-4 w-20">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <!-- logo-title -->
            <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mb-6">Sign in to manage your issues</p>
            <form class="space-y-4 text-left">
                <!-- username -->
                <div class="">
                    <label class=" block text-sm font-medium">Username</label>
                    <input id="username" value="admin" type="text" placeholder="Enter Username"
                        class="w-full border-none bg-gray-200  rounded-md px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <p class="text-xs text-blue-500 mt-1">Default:admin</p>
                </div>
                <!-- password -->
                <div>
                    <label class=" block text-sm font-medium">Password</label>
                    <input id="password" value="admin123" type="password" placeholder="Enter Password"
                        class="w-full border-none bg-gray-200 rounded-md px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <p class="text-xs text-blue-500 mt-1">Default:admin123</p>
                </div>
                <!-- button -->
                <button id="signIn-btn" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 ">Sign
                    In</button>
            </form>

            <div class="flex items-center my-4">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="mx-3 text-gray-500">OR</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <div class="text-sm text-gray-700">
                <p class="mb-2 text-gray-400">Demo Credentials:</p>
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> admin123</p>
            </div>

        </div>
    </main>
    <!-- Modal PopUp -->
    <!-- Open the modal using ID.showModal() method -->

    <dialog id="logInModal" class="modal" onclick="logInModal.showModal()">
        <div class="modal-box">
            <h3 id="modal-head" class="text-lg font-bold"></h3>
            <p id="modal-massage" class="py-4"></p>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>


    <!-- Java Script -->
    <script src="./script/script.js"></script>
</body>

</html>
